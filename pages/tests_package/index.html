<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>tests</title><link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#f5f5f7;font-family:'Nunito',sans-serif}.site-canvas{width:100%;max-width:1000px;margin:0 auto;position:relative;min-height:100vh;overflow:hidden}#wx-blk-1{position:absolute;z-index:1;box-sizing:border-box;--y-index:10;left:1.6666666666666667%;top:10px;width:66.66666666666666%;height:400px;background-color:#ffffff;color:#1d1d1f;border-radius:16px 16px 251.5px 16px;border:none;box-shadow:0px 8px 24px 0px rgba(0,0,0,0.08);opacity:1;}
#wx-blk-1 .content-area{padding:0px;font-size:16px;font-weight:400;text-align:left;width:100%;height:100%;box-sizing:border-box;}
#wx-blk-2{position:absolute;z-index:2;box-sizing:border-box;--y-index:50;left:5%;top:50px;width:60%;height:100px;background-color:transparent;color:#1d1d1f;border-radius:8px 8px 8px 8px;border:none;box-shadow:none;opacity:1;}
#wx-blk-2 .content-area{padding:12px;font-size:16px;font-weight:400;text-align:left;width:100%;height:100%;box-sizing:border-box;}
#wx-blk-3{position:absolute;z-index:3;box-sizing:border-box;--y-index:50;left:70%;top:50px;width:25%;height:250px;background-color:transparent;color:#1d1d1f;border-radius:30px 30px 30px 30px;border:none;box-shadow:4px 4px 0px 0px rgba(0,0,0,0.15);opacity:1;}
#wx-blk-3 .content-area{padding:12px;font-size:16px;font-weight:400;text-align:left;width:100%;height:100%;box-sizing:border-box;}
@media(max-width:768px){.site-canvas{display:flex!important;flex-direction:column!important;padding:20px!important;gap:20px!important;height:auto!important}.wx-block{position:relative!important;left:0!important;top:0!important;width:100%!important;height:auto!important;min-height:40px;order:var(--y-index)!important}.wx-block.type-shape .content-area{display:flex!important;flex-direction:column!important;gap:16px!important;padding:20px!important}}</style></head><body><div class="site-canvas"><div id="wx-blk-1" class="wx-block type-shape"><div class="content-area"></div></div>
